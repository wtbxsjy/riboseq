name: prepare_ensembl_annotation
description: Download and prepare Ensembl annotation files for gencode-riboseqORFs
keywords:
  - ensembl
  - annotation
  - download
  - gtf
  - fasta
tools:
  - wget:
      description: Network downloader
      homepage: https://www.gnu.org/software/wget/
      documentation: https://www.gnu.org/software/wget/manual/
      licence: ["GPL v3+"]
  - python:
      description: Python programming language
      homepage: https://www.python.org/
      documentation: https://docs.python.org/3/
      licence: ["PSF"]

input:
  - ensembl_release:
      type: integer
      description: Ensembl release number (e.g., 110, 111)
  - genome_assembly:
      type: string
      description: Genome assembly version (e.g., GRCh38, GRCm39)
  - species:
      type: string
      description: Species name in lowercase with underscore (e.g., homo_sapiens, mus_musculus)

output:
  - ensembl_dir:
      type: directory
      description: |
        Directory containing all Ensembl annotation files:
        - Sorted GTF file
        - Proteome FASTA
        - Transcriptome FASTA (cDNA + ncRNA)
        - Transcript support file (TSL/APPRIS)
        - P-sites BED file
      pattern: "Ens*/"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@nf-core"
maintainers:
  - "@nf-core"
