name: gencode_orf_mapper
description: Unified ORF annotation using gencode-riboseqORFs
keywords:
  - riboseq
  - orf
  - annotation
  - gencode
  - unification
tools:
  - gencode_orf_mapper:
      description: |
        Tool for unifying Ribo-seq ORF predictions across multiple studies
        and mapping them to GENCODE/Ensembl annotation
      homepage: https://github.com/jorruior/gencode-riboseqORFs
      documentation: https://github.com/jorruior/gencode-riboseqORFs/blob/master/README.md
      doi: "10.1038/s41587-022-01369-0"
      licence: ["MIT"]

input:
  - orfs_fasta:
      type: file
      description: |
        FASTA file with all translated candidate ORFs.
        Format: >{ORF_NAME}--{STUDY_ID}
      pattern: "*.{fa,fasta}"
  - orfs_bed:
      type: file
      description: |
        1-based BED file with ORF genomic coordinates.
        Columns: chr, start, end, ORF_NAME, STUDY_ID, strand
      pattern: "*.bed"
  - ensembl_dir:
      type: directory
      description: |
        Directory containing Ensembl annotation files:
        - Sorted GTF file
        - Proteome FASTA
        - Transcriptome FASTA
        - Transcript support (TSL/APPRIS)
        - P-sites BED file
  - project_id:
      type: string
      description: Project identifier used for output file naming

output:
  - unified_fasta:
      type: file
      description: Unified ORF protein sequences
      pattern: "*.orfs.fa"
  - unified_bed:
      type: file
      description: Unified ORF genomic coordinates (1-based)
      pattern: "*.orfs.bed"
  - unified_gtf:
      type: file
      description: Unified ORF GTF annotation
      pattern: "*.orfs.gtf"
  - unified_table:
      type: file
      description: |
        Detailed ORF feature table with:
        - ORF ID and biotype classification
        - Host gene information
        - Dataset support
        - Variant information
      pattern: "*.orfs.out"
  - altmapped:
      type: file
      description: ORFs that mapped to multiple genomic locations
      pattern: "*.altmapped"
  - unmapped:
      type: file
      description: ORFs that could not be mapped or were filtered
      pattern: "*.unmapped"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@yourname"
maintainers:
  - "@yourname"
