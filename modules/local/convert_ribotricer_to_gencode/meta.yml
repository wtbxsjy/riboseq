name: convert_ribotricer_to_gencode
description: Convert Ribotricer output to gencode-riboseqORFs compatible format
keywords:
  - riboseq
  - orf
  - format conversion
  - ribotricer
  - gencode
tools:
  - ribotricer:
      description: Ribotricer ORF detection tool
      homepage: https://github.com/smithlabcode/ribotricer
      documentation: https://github.com/smithlabcode/ribotricer/blob/master/README.md
      doi: "10.1093/nar/gkaa028"
      licence: ["GPL v3"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', study_id:'my_study' ]
  - ribotricer_orfs:
      type: file
      description: Ribotricer ORF detection output (TSV)
      pattern: "*.tsv"
  - fasta:
      type: file
      description: Genome FASTA file for sequence extraction
      pattern: "*.{fa,fasta,fa.gz,fasta.gz}"
  - gtf:
      type: file
      description: GTF annotation file (optional)
      pattern: "*.gtf"

output:
  - meta:
      type: map
      description: Groovy Map containing sample information
  - fasta:
      type: file
      description: |
        ORF sequences in gencode-riboseqORFs format
        Format: >{ORF_NAME}--{STUDY_ID}
      pattern: "*.gencode.fa"
  - bed:
      type: file
      description: |
        ORF coordinates in 1-based BED format
        Columns: chr, start, end, ORF_NAME, STUDY_ID, strand
      pattern: "*.gencode.bed"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@nf-core"
maintainers:
  - "@nf-core"
