name: gencode_orf_annotation
description: Unified ORF annotation using gencode-riboseqORFs
keywords:
  - riboseq
  - orf
  - annotation
  - gencode
  - unification
components:
  - download_ensembl_files
  - calculate_psite_bed
  - convert_ribotish_to_gencode
  - convert_ribotricer_to_gencode
  - gencode_orf_mapper

input:
  - ch_ribotish_orfs:
      type: channel
      description: |
        Channel containing Ribo-TISH predictions
        Structure: [ meta, predict_file, quality_file ]
  - ch_ribotricer_orfs:
      type: channel
      description: |
        Channel containing Ribotricer predictions
        Structure: [ meta, orfs_file ]
  - ch_fasta:
      type: channel
      description: Genome FASTA file
  - ch_gtf:
      type: channel
      description: Genome GTF annotation
  - ensembl_release:
      type: integer
      description: Ensembl release number (e.g., 110)
  - genome_assembly:
      type: string
      description: Genome assembly version (e.g., GRCh38, GRCm39)
  - species:
      type: string
      description: Species name (e.g., homo_sapiens, mus_musculus)
  - project_id:
      type: string
      description: Project identifier for output naming

output:
  - unified_fasta:
      type: file
      description: Unified ORF protein sequences (GENCODE format)
      pattern: "*.orfs.fa"
  - unified_bed:
      type: file
      description: Unified ORF genomic coordinates (1-based BED)
      pattern: "*.orfs.bed"
  - unified_gtf:
      type: file
      description: Unified ORF GTF annotation
      pattern: "*.orfs.gtf"
  - unified_table:
      type: file
      description: |
        Detailed ORF feature table with:
        - ORF classification (uORF, dORF, lncRNA-ORF, etc.)
        - Host gene information
        - Cross-dataset support
        - Variant information
      pattern: "*.orfs.out"
  - altmapped:
      type: file
      description: ORFs mapped to multiple genomic locations
      pattern: "*.altmapped"
  - unmapped:
      type: file
      description: ORFs that could not be mapped
      pattern: "*.unmapped"
  - merged_fasta:
      type: file
      description: Merged ORF sequences from all tools (before unification)
      pattern: "*_all_orfs.fa"
  - merged_bed:
      type: file
      description: Merged ORF coordinates from all tools (before unification)
      pattern: "*_all_orfs.bed"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@nf-core"
maintainers:
  - "@nf-core"
