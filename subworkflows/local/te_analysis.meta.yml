# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "te_analysis"
description: >
  Translational Efficiency (TE) Analysis — integrates RNA-seq and Ribo-seq data
  using the deltaTE method (Chothani et al. 2019) implemented with DESeq2.
  Orchestrates three steps:
  1. featureCounts quantification of ORF-level reads
  2. Merging per-sample counts into a gene-by-sample matrix
  3. DESeq2 interaction model for differential translation detection
keywords:
  - translational efficiency
  - DESeq2
  - deltaTE
  - featureCounts
  - ribosome profiling
components:
  - quantify_orfs
  - merge_counts
  - deseq2_deltate
input:
  - ch_te_bams:
      type: tuple
      description: |
        Channel containing BAM files for both RNA-seq and Ribo-seq samples.
        Each element is tuple(val(meta), path(bam), path(bai)).
        meta must include: id, sample_type ("riboseq" or "rnaseq"), group.
      pattern: "*.{bam,bai}"
  - ch_orfs_bed:
      type: file
      description: Unified ORF annotation in BED12 format for featureCounts.
  - ch_contrasts:
      type: tuple
      description: |
        Contrast definitions for DESeq2 analysis.
        Each element is tuple(val(meta), val(variable), val(reference), val(target)).
        variable must be a column in the sample sheet.
  - ch_gtf:
      type: file
      description: Reference GTF annotation file (reserved for future use).
output:
  - te_results:
      type: file
      description: Per-ORF translation deltaTE results table.
      pattern: "*.translation.deltate.results.tsv"
  - te_genes:
      type: file
      description: Differentially Translated Genes (DTEGs) summary.
      pattern: "*.dtegs.deltate.genes.tsv"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"
authors:
  - "@renzhe"
